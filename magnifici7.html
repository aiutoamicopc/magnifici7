<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Magnifici 7 — Checklist del tuo progetto web</title>
</head>
<body>
<div id="m7-root"></div>

<style>
  html, body { margin: 0; padding: 0; }
  #m7-root * { box-sizing: border-box; }
  #m7-root {
    --bg: #0b0818;
    --panel: linear-gradient(145deg, #110d22, #1a1430);
    --panel-flat: #150f28;
    --border: rgba(140, 100, 220, 0.12);
    --accent: #b388ff;
    --accent-dim: #6a4c9c;
    --text: #e8e0f0;
    --text-dim: #9a8cb8;
    --text-faint: #6f6488;
    --gold: #ffd54f;
    --gold-dark: #f9a825;
    --green: #4caf84;
    --surface-1: rgba(20,15,40,0.5);
    --surface-2: rgba(0,0,0,0.25);
    --track: #1f1738;
    --btn-bg: rgba(255,255,255,0.04);
    --swatch-border: rgba(255,255,255,0.15);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    min-height: 100vh;
    transition: background 0.4s ease;
  }
  #m7-root .m7-theme-picker { display: flex; align-items: center; gap: 6px; margin-left: 4px; }
  #m7-root .m7-theme-swatch {
    width: 20px; height: 20px; border-radius: 50%; cursor: pointer;
    border: 2px solid var(--swatch-border);
    transition: 0.2s;
  }
  #m7-root .m7-theme-swatch:hover { transform: scale(1.15); }
  #m7-root .m7-theme-swatch.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.25); }
  #m7-root .m7-container { max-width: 1200px; margin: 0 auto; }

  #m7-root .m7-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 18px;
  }
  #m7-root .m7-title-block { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  #m7-root .m7-rocket { font-size: 1.6rem; }
  #m7-root .m7-project-name {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent);
    background: transparent;
    border: none;
    outline: none;
    border-bottom: 1px dashed transparent;
    max-width: 420px;
  }
  #m7-root .m7-project-name:hover, #m7-root .m7-project-name:focus {
    border-bottom: 1px dashed var(--accent-dim);
  }
  #m7-root .m7-badge {
    font-size: 0.68rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--gold);
    background: rgba(255, 213, 79, 0.1);
    border: 1px solid rgba(255, 213, 79, 0.25);
    padding: 4px 12px;
    border-radius: 20px;
    white-space: nowrap;
  }
  #m7-root .m7-header-actions { display: flex; gap: 10px; }
  #m7-root .m7-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--btn-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    text-decoration: none;
    transition: 0.2s;
  }
  #m7-root .m7-btn:hover { background: rgba(140,100,220,0.15); border-color: var(--accent-dim); }
  #m7-root .m7-btn.m7-danger:hover { background: rgba(220,80,80,0.15); border-color: rgba(220,80,80,0.4); }

  #m7-root .m7-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 30px;
    background: rgba(0,0,0,0.25);
    padding: 14px 22px;
    border-radius: 14px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  #m7-root .m7-stats .m7-stat { display: flex; align-items: baseline; gap: 6px; font-size: 0.85rem; color: var(--text-dim); }
  #m7-root .m7-stats strong { color: var(--text); font-size: 1.05rem; }

  #m7-root .m7-progress-label {
    display: flex; justify-content: space-between;
    font-size: 0.72rem; color: var(--text-faint); margin-bottom: 6px;
  }
  #m7-root .m7-bar { width: 100%; height: 10px; background: var(--track); border-radius: 20px; overflow: hidden; margin-bottom: 22px; }
  #m7-root .m7-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent-dim), var(--accent)); border-radius: 20px; transition: width 0.6s ease; }

  #m7-root .m7-fasi { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 22px; }
  @media (max-width: 900px) { #m7-root .m7-fasi { grid-template-columns: repeat(4, 1fr); } }
  @media (max-width: 560px) { #m7-root .m7-fasi { grid-template-columns: repeat(2, 1fr); } }

  #m7-root .m7-fase-card {
    background: var(--surface-1);
    padding: 14px 8px;
    border-radius: 14px;
    border: 1px solid var(--border);
    cursor: pointer;
    text-align: center;
    transition: 0.2s;
  }
  #m7-root .m7-fase-card:hover { background: rgba(40,28,70,0.6); transform: translateY(-2px); }
  #m7-root .m7-fase-card.active { border-color: var(--accent-dim); background: rgba(60,40,110,0.25); box-shadow: 0 0 0 1px rgba(179,136,255,0.25); }
  #m7-root .m7-fase-card .m7-icon { font-size: 1.4rem; display: block; margin-bottom: 4px; }
  #m7-root .m7-fase-card .m7-nome { font-weight: 600; font-size: 0.72rem; color: var(--text); display: block; }
  #m7-root .m7-fase-card .m7-status { font-size: 0.7rem; display: block; margin-top: 3px; }
  #m7-root .m7-fase-card .m7-count { font-size: 0.62rem; color: var(--text-faint); display: block; margin-top: 2px; }
  #m7-root .m7-mini { width: 100%; height: 3px; background: var(--track); border-radius: 10px; margin-top: 6px; overflow: hidden; }
  #m7-root .m7-mini-fill { height: 100%; width: 0%; background: var(--accent-dim); border-radius: 10px; transition: width 0.5s; }

  #m7-root .m7-dettaglio { background: var(--panel); padding: 22px; border-radius: 20px; border: 1px solid var(--border); }
  #m7-root .m7-dettaglio-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
  #m7-root .m7-dettaglio-head h2 { font-size: 1.15rem; color: var(--text); font-weight: 700; margin: 0; }
  #m7-root .m7-phase-badge { font-size: 0.72rem; color: var(--text-dim); background: var(--surface-2); padding: 4px 12px; border-radius: 20px; }

  #m7-root .m7-check-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px; border-radius: 12px;
    background: var(--surface-1);
    margin-bottom: 6px;
    border: 1px solid rgba(140,100,220,0.05);
  }
  #m7-root .m7-check-item.done { border-left: 4px solid var(--green); background: rgba(60,180,120,0.06); }
  #m7-root .m7-check-item.done .m7-title { color: var(--green); text-decoration: line-through; }
  #m7-root .m7-check-item.booster { border-left: 4px solid var(--gold); background: rgba(255,213,79,0.05); }
  #m7-root .m7-check-item.booster.done { border-left: 4px solid var(--gold-dark); background: rgba(255,213,79,0.09); }
  #m7-root .m7-check-item input[type="checkbox"] { width: 19px; height: 19px; margin-top: 2px; accent-color: var(--accent-dim); cursor: pointer; flex-shrink: 0; }
  #m7-root .m7-check-item input[type="checkbox"]:checked { accent-color: var(--green); }
  #m7-root .m7-check-item.booster input[type="checkbox"]:checked { accent-color: var(--gold-dark); }
  #m7-root .m7-done-icon { margin-right: 4px; }
  #m7-root .m7-content { flex: 1; min-width: 0; }
  #m7-root .m7-title { font-weight: 500; color: var(--text); font-size: 0.87rem; }
  #m7-root .m7-booster-badge {
    font-size: 0.56rem; font-weight: 700; background: rgba(255,213,79,0.14); color: var(--gold);
    padding: 2px 9px; border-radius: 20px; margin-left: 8px; white-space: nowrap;
  }
  #m7-root .m7-spiegazione {
    font-size: 0.79rem; color: var(--text-dim); margin-top: 8px; line-height: 1.6;
    display: none; background: var(--surface-2); padding: 10px 12px; border-radius: 10px;
    border-left: 2px solid var(--accent-dim);
  }
  #m7-root .m7-note {
    width: 100%; margin-top: 8px; background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px;
    color: #c8bce0; font-size: 0.78rem; font-family: inherit; resize: vertical; min-height: 34px;
  }
  #m7-root .m7-note::placeholder { color: var(--text-faint); }
  #m7-root .m7-toggle {
    background: rgba(140,100,220,0.06); border: none; color: var(--accent);
    cursor: pointer; font-size: 0.68rem; padding: 4px 12px; border-radius: 20px;
    transition: 0.2s; flex-shrink: 0; align-self: flex-start; white-space: nowrap;
  }
  #m7-root .m7-toggle:hover { background: rgba(140,100,220,0.15); }

  #m7-root .m7-modal-overlay {
    position: fixed; inset: 0; background: rgba(5,3,12,0.75);
    display: flex; align-items: center; justify-content: center; z-index: 999; padding: 20px;
  }
  #m7-root .m7-modal {
    background: var(--panel); border: 1px solid var(--border); border-radius: 20px;
    padding: 32px; max-width: 420px; width: 100%; text-align: center;
  }
  #m7-root .m7-modal h2 { color: var(--accent); margin: 8px 0 6px; font-size: 1.3rem; }
  #m7-root .m7-modal p { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 18px; }
  #m7-root .m7-modal input {
    width: 100%; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 0.95rem; margin-bottom: 14px;
  }
  #m7-root .m7-modal button {
    width: 100%; background: linear-gradient(90deg, var(--accent-dim), var(--accent)); border: none;
    color: white; font-weight: 600; padding: 12px; border-radius: 10px; cursor: pointer; font-size: 0.9rem;
  }

  #m7-root .m7-modal-tabs { display: flex; gap: 8px; margin-bottom: 18px; background: var(--surface-2); padding: 4px; border-radius: 12px; }
  #m7-root .m7-modal-tab {
    flex: 1; padding: 9px; border-radius: 9px; border: none; background: transparent;
    color: var(--text-dim); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: 0.2s;
  }
  #m7-root .m7-modal-tab.active { background: rgba(140,100,220,0.2); color: var(--text); }
  #m7-root .m7-modal-panel { display: none; }
  #m7-root .m7-modal-panel.active { display: block; }
  #m7-root .m7-modal-dropzone {
    border: 2px dashed var(--border); border-radius: 14px; padding: 24px 16px;
    text-align: center; cursor: pointer; margin-bottom: 14px; transition: 0.2s;
  }
  #m7-root .m7-modal-dropzone:hover, #m7-root .m7-modal-dropzone.dragover { border-color: var(--accent-dim); background: rgba(140,100,220,0.06); }
  #m7-root .m7-modal-dropzone .m7-dz-icon { font-size: 1.6rem; display: block; margin-bottom: 6px; }
  #m7-root .m7-modal-dropzone .m7-dz-text { font-size: 0.78rem; color: var(--text-dim); }
  #m7-root .m7-modal-filename { font-size: 0.75rem; color: var(--accent); margin-top: 8px; word-break: break-all; }

  #m7-root .m7-btn.m7-send { background: linear-gradient(90deg, var(--accent-dim), var(--accent)); border: none; color: #fff; font-weight: 600; }
  #m7-root .m7-btn.m7-send:hover { filter: brightness(1.1); background: linear-gradient(90deg, var(--accent-dim), var(--accent)); }
  #m7-root .m7-btn.m7-send:disabled { opacity: 0.4; cursor: not-allowed; filter: none; }

  @media print {
    #m7-root .m7-header-actions, #m7-root .m7-fasi, #m7-root .m7-toggle { display: none !important; }
    #m7-root .m7-spiegazione { display: block !important; }
    #m7-root { background: white; color: #111; padding: 0; }
    #m7-root .m7-dettaglio { background: white; border: none; }
    #m7-root .m7-check-item { break-inside: avoid; border: 1px solid #ccc; background: white; }
    #m7-root .m7-title { color: #111 !important; }
    #m7-root .m7-spiegazione { color: #333; background: #f4f4f4; }
  }
</style>

  const STORAGE_KEY = "m7-state";
  let state = { projectName: null, faseAttiva: 0, progressi: {}, theme: "antracite" };

  const root = document.getElementById("m7-root");

  function totalTasks() { return FASI.reduce((s, f) => s + f.checks.length, 0); }

  async function loadState() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        state = Object.assign(state, parsed);
      }
    } catch (e) { /* nessuno stato salvato ancora, o localStorage non disponibile */ }
  }

  async function saveState() {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    } catch (e) { console.error("Errore salvataggio:", e); }
  }

  function escapeHtml(str) {
    const d = document.createElement("div");
    d.textContent = str;
    return d.innerHTML;
  }

  function debounce(fn, delay) {
    let t;
    return (...args) => {
      clearTimeout(t);
      t = setTimeout(() => fn(...args), delay);
    };
  }
  const debouncedSaveNote = debounce(saveState, 600);

  function slugify(str) {
    return (str || "progetto")
      .toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-z0-9]+/g, "-")
      .replace(/(^-|-$)/g, "") || "progetto";
  }

  function exportProgress() {
    const payload = {
      tipo: "magnifici7-salvataggio",
      versione: 1,
      esportatoIl: new Date().toISOString(),
      projectName: state.projectName,
      faseAttiva: state.faseAttiva,
      progressi: state.progressi
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const dateStr = new Date().toISOString().slice(0, 10);
    a.href = url;
    a.download = `magnifici7-${slugify(state.projectName)}-${dateStr}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  function importProgress(file) {
    const reader = new FileReader();
    reader.onload = async (e) => {
      let data;
      try {
        data = JSON.parse(e.target.result);
      } catch (err) {
        alert("Il file selezionato non è un salvataggio valido (JSON non leggibile).");
        return;
      }
      if (!data || typeof data.progressi !== "object") {
        alert("Il file non sembra un salvataggio de I Magnifici 7. Controlla di aver scelto il file giusto.");
        return;
      }
      const applyImport = async (mode) => {
        if (mode === "sostituisci") {
          state.progressi = data.progressi || {};
        } else {
          state.progressi = Object.assign({}, state.progressi, data.progressi || {});
        }
        if (data.projectName && (mode === "sostituisci" || !state.projectName)) {
          state.projectName = data.projectName;
        }
        if (typeof data.faseAttiva === "number") state.faseAttiva = data.faseAttiva;
        await saveState();
        render();
      };
      const hasExisting = Object.keys(state.progressi || {}).length > 0;
      if (hasExisting) {
        const scelta = confirm(
          `Hai già progressi salvati per "${state.projectName}".\n\nOK = sostituisci tutto con il file importato ("${data.projectName || "senza nome"}")\nAnnulla = unisci il file importato con i progressi attuali`
        );
        await applyImport(scelta ? "sostituisci" : "unisci");
      } else {
        await applyImport("sostituisci");
      }
    };
    reader.readAsText(file);
  }

  function calcolaAvanzamento() {
    let total = 0, done = 0, boosterDone = 0;
    FASI.forEach((fase, idx) => {
      fase.checks.forEach((_, i) => {
        const key = idx + "_" + i;
        total++;
        if (state.progressi[key] && state.progressi[key].completato) {
          done++;
          if (i === fase.checks.length - 1) boosterDone++;
        }
      });
    });
    const percent = total > 0 ? Math.round((done / total) * 100) : 0;
    return { total, done, boosterDone, percent };
  }

  function sendReport() {
    const { done, total, percent, boosterDone } = calcolaAvanzamento();
    if (percent < CONFIG.minPercentToSend) {
      alert(`Completa almeno il ${CONFIG.minPercentToSend}% della checklist prima di inviare (ora sei al ${percent}%). Continua a compilare e riprova!`);
      return;
    }
    // Scarica il file di salvataggio da allegare
    exportProgress();
    const subject = encodeURIComponent(`Progressi "${state.projectName}" — I Magnifici 7 (${percent}%)`);
    const body = encodeURIComponent(
      `Ciao,\n\nti invio i progressi del progetto "${state.projectName}".\n\n` +
      `Completati: ${done}/${total} (${percent}%)\nBooster ottenuti: ${boosterDone}/7\n\n` +
      `⚠️ Ho appena scaricato il file di salvataggio (.json) — ricordati di allegarlo a questa email prima di inviarla!\n\n`
    );
    window.location.href = `mailto:${CONFIG.recipientEmail}?subject=${subject}&body=${body}`;
  }

  function render() {
    if (!state.projectName) {
      renderModal();
      return;
    }

    const { total, done, boosterDone, percent } = calcolaAvanzamento();

    let fasiHtml = "";
    FASI.forEach((fase, idx) => {
      const active = idx === state.faseAttiva ? " active" : "";
      let faseDone = 0;
      fase.checks.forEach((_, i) => {
        const key = idx + "_" + i;
        if (state.progressi[key] && state.progressi[key].completato) faseDone++;
      });
      const pct = Math.round((faseDone / fase.checks.length) * 100);
      const lastKey = idx + "_" + (fase.checks.length - 1);
      const boosterDoneLocal = state.progressi[lastKey] && state.progressi[lastKey].completato;
      let statusIcon = "⏳";
      if (pct === 100 && boosterDoneLocal) statusIcon = "🏆";
      else if (pct === 100) statusIcon = "✅";
      else if (pct > 0) statusIcon = "🔄";

      fasiHtml += `
        <div class="m7-fase-card${active}" data-fase="${idx}">
          <span class="m7-icon">${fase.icon}</span>
          <span class="m7-nome">${fase.nome}</span>
          <span class="m7-status">${statusIcon}</span>
          <span class="m7-count">${faseDone}/${fase.checks.length}</span>
          <div class="m7-mini"><div class="m7-mini-fill" style="width:${pct}%"></div></div>
        </div>`;
    });

    const faseAttivaObj = FASI[state.faseAttiva];
    let faseDoneCount = 0;
    faseAttivaObj.checks.forEach((_, i) => {
      const key = state.faseAttiva + "_" + i;
      if (state.progressi[key] && state.progressi[key].completato) faseDoneCount++;
    });
    const fasePercent = Math.round((faseDoneCount / faseAttivaObj.checks.length) * 100);

    let itemsHtml = "";
    faseAttivaObj.checks.forEach((task, i) => {
      const key = state.faseAttiva + "_" + i;
      const data = state.progressi[key] || { completato: false, note: "" };
      const isBooster = i === faseAttivaObj.checks.length - 1;
      const doneClass = data.completato ? " done" : "";
      const boosterClass = isBooster ? " booster" : "";
      const title = task[0].replace("🏆 BOOSTER — ", "");
      itemsHtml += `
        <div class="m7-check-item${doneClass}${boosterClass}">
          <input type="checkbox" class="m7-checkbox" data-key="${key}" ${data.completato ? "checked" : ""}>
          <div class="m7-content">
            <span class="m7-title"><span class="m7-done-icon">${data.completato ? "✅" : "⬜"}</span>${escapeHtml(title)}${isBooster ? '<span class="m7-booster-badge">🏆 BOOSTER</span>' : ""}</span>
            <div class="m7-spiegazione" id="m7-spiega-${key}">💡 ${escapeHtml(task[1])}</div>
            <textarea class="m7-note" data-key="${key}" placeholder="📝 Note personali...">${escapeHtml(data.note || "")}</textarea>
          </div>
          <button class="m7-toggle" data-key="${key}">📖 Spiegazione</button>
        </div>`;
    });

    const themeSwatches = Object.entries(THEMES).map(([key, t]) =>
      `<div class="m7-theme-swatch${state.theme === key ? " active" : ""}" data-theme="${key}" style="background:${t.swatch}" title="${t.label}"></div>`
    ).join("");

    root.innerHTML = `
      <div class="m7-container">
        <div class="m7-header">
          <div class="m7-title-block">
            <span class="m7-rocket">🚀</span>
            <input class="m7-project-name" id="m7-project-input" value="${escapeHtml(state.projectName)}" spellcheck="false">
            <span class="m7-badge">✦ I MAGNIFICI 7</span>
            <div class="m7-theme-picker">${themeSwatches}</div>
          </div>
          <div class="m7-header-actions">
            <button class="m7-btn" id="m7-export-btn">⬇️ Esporta</button>
            <button class="m7-btn" id="m7-import-btn">⬆️ Importa</button>
            <input type="file" id="m7-import-file" accept=".json,application/json" style="display:none;">
            <a class="m7-btn" id="m7-ebook-btn" href="${CONFIG.ebookUrl}" target="_blank" download>📖 Ebook gratis</a>
            <button class="m7-btn" id="m7-pdf-btn">📄 PDF</button>
            <button class="m7-btn m7-send" id="m7-send-btn">📤 Invia a</button>
            <button class="m7-btn m7-danger" id="m7-reset-btn">↺ Reset</button>
          </div>
        </div>

        <div class="m7-stats">
          <span class="m7-stat">📊 Completati <strong>${done}</strong>/${total}</span>
          <span class="m7-stat">📈 Progresso <strong>${percent}%</strong></span>
          <span class="m7-stat">🏆 Booster <strong>${boosterDone}</strong>/7</span>
          <span class="m7-stat">🚩 Fase <strong>${faseAttivaObj.nome}</strong></span>
        </div>

        <div class="m7-progress-label"><span>Avanzamento generale</span><span>${percent}%</span></div>
        <div class="m7-bar"><div class="m7-fill" style="width:${percent}%"></div></div>

        <div class="m7-fasi">${fasiHtml}</div>

        <div class="m7-dettaglio">
          <div class="m7-dettaglio-head">
            <h2>${faseAttivaObj.icon} ${faseAttivaObj.nome}</h2>
            <span class="m7-phase-badge">${faseDoneCount}/${faseAttivaObj.checks.length} · ${fasePercent}%</span>
          </div>
          ${itemsHtml}
        </div>
      </div>
    `;

    attachEvents();
  }

      </div>
    `;

    const tabs = root.querySelectorAll(".m7-modal-tab");
    const panels = root.querySelectorAll(".m7-modal-panel");
    tabs.forEach((tab) => {
      tab.addEventListener("click", () => {
        tabs.forEach((t) => t.classList.remove("active"));
        panels.forEach((p) => p.classList.remove("active"));
        tab.classList.add("active");
        root.querySelector(`.m7-modal-panel[data-panel="${tab.dataset.tab}"]`).classList.add("active");
      });
    });

    // Percorso: nuovo progetto
    const input = document.getElementById("m7-name-input");
    const btn = document.getElementById("m7-start-btn");
    const start = async () => {
      const val = input.value.trim();
      if (!val) { input.focus(); return; }
      state.projectName = val;
      await saveState();
      render();
    };
    btn.addEventListener("click", start);
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") start(); });

    // Percorso: importa salvataggio esistente
    const dropzone = document.getElementById("m7-modal-dropzone");
    const modalFile = document.getElementById("m7-modal-file");
    const filenameEl = document.getElementById("m7-modal-filename");

    const handleModalFile = (file) => {
      if (!file) return;
      filenameEl.textContent = "Caricamento di " + file.name + "...";
      const reader = new FileReader();
      reader.onload = async (e) => {
        let data;
        try {
          data = JSON.parse(e.target.result);
        } catch (err) {
          filenameEl.textContent = "";
          alert("Questo file non è un salvataggio valido (JSON non leggibile).");
          return;
        }
        if (!data || typeof data.progressi !== "object" || !data.projectName) {
          filenameEl.textContent = "";
          alert("Il file non contiene un progetto riconoscibile de I Magnifici 7.");
          return;
        }
        state.projectName = data.projectName;
        state.progressi = data.progressi || {};
        state.faseAttiva = typeof data.faseAttiva === "number" ? data.faseAttiva : 0;
        await saveState();
        render();
      };
      reader.readAsText(file);
    };

    dropzone.addEventListener("click", () => { modalFile.value = ""; modalFile.click(); });
    modalFile.addEventListener("change", (e) => handleModalFile(e.target.files[0]));
    dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("dragover"); });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
    dropzone.addEventListener("drop", (e) => {
      e.preventDefault();
      dropzone.classList.remove("dragover");
      handleModalFile(e.dataTransfer.files[0]);
    });
  }

  function attachEvents() {
    document.getElementById("m7-project-input").addEventListener("change", async (e) => {
      state.projectName = e.target.value.trim() || state.projectName;
      await saveState();
    });

    document.getElementById("m7-pdf-btn").addEventListener("click", () => {
      window.print();
    });

    document.getElementById("m7-export-btn").addEventListener("click", () => {
      exportProgress();
    });

    const fileInput = document.getElementById("m7-import-file");
    document.getElementById("m7-import-btn").addEventListener("click", () => {
      fileInput.value = "";
      fileInput.click();
    });
    fileInput.addEventListener("change", (e) => {
      const file = e.target.files[0];
      if (file) importProgress(file);
    });

    document.getElementById("m7-send-btn").addEventListener("click", () => {
      sendReport();
    });

    root.querySelectorAll(".m7-theme-swatch").forEach((sw) => {
      sw.addEventListener("click", async () => {
        state.theme = sw.dataset.theme;
        applyTheme(state.theme);
        await saveState();
        render();
      });
    });

    document.getElementById("m7-reset-btn").addEventListener("click", async () => {
      if (confirm("Sicuro di voler azzerare tutti i progressi? L'azione non è reversibile.")) {
        state = { projectName: state.projectName, faseAttiva: 0, progressi: {} };
        await saveState();
        render();
      }
    });

    root.querySelectorAll(".m7-fase-card").forEach((card) => {
      card.addEventListener("click", async () => {
        state.faseAttiva = parseInt(card.dataset.fase, 10);
        await saveState();
        render();
      });
    });

    root.querySelectorAll(".m7-checkbox").forEach((cb) => {
      cb.addEventListener("change", async (e) => {
        const key = e.target.dataset.key;
        if (!state.progressi[key]) state.progressi[key] = { completato: false, note: "" };
        state.progressi[key].completato = e.target.checked;
        await saveState();
        render();
      });
    });

    root.querySelectorAll(".m7-toggle").forEach((btn) => {
      btn.addEventListener("click", () => {
        const key = btn.dataset.key;
        const el = document.getElementById("m7-spiega-" + key);
        const isOpen = el.style.display === "block";
        el.style.display = isOpen ? "none" : "block";
        btn.textContent = isOpen ? "📖 Spiegazione" : "📕 Chiudi";
      });
    });

    root.querySelectorAll(".m7-note").forEach((ta) => {
      ta.addEventListener("input", (e) => {
        const key = e.target.dataset.key;
        if (!state.progressi[key]) state.progressi[key] = { completato: false, note: "" };
        state.progressi[key].note = e.target.value;
        debouncedSaveNote();
      });
    });
  }

  (async function init() {
    root.innerHTML = `<div style="padding:60px;text-align:center;color:#9a8cb8;">Caricamento...</div>`;
    await loadState();
    applyTheme(state.theme || "antracite");
    render();
  })();
})();
</script>
</body>
</html>
